name: Docs Pages

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/docs-pages.yml"
      - "docfx.json"
      - "docfx/**"
      - "docs/**"
      - "src/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install DocFX
        run: dotnet tool install --global docfx

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore solution
        run: dotnet restore TinyPl0.sln

      - name: Clean generated site output
        run: rm -rf _site

      - name: Build HTML documentation
        run: docfx docfx.json

      - name: Start local preview server
        run: python3 -m http.server 8080 --directory _site > /tmp/tinypl0-docs-server.log 2>&1 &

      - name: Smoke test generated site
        run: ./scripts/smoke-test-pages.sh http://127.0.0.1:8080

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Smoke test published site
        run: ./scripts/smoke-test-pages.sh "${{ needs.deploy.outputs.page_url }}"
